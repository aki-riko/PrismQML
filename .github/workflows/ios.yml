name: Build iOS (C++ host)

# 在 GitHub 免费 macOS runner 上构建 prism C++ 宿主的 iOS 版本。
# Windows 本地无法编 iOS(苹果限制 iOS SDK 仅 macOS), 用此 CI 验证 iOS 可构建。
# 手动触发: Actions 页 → Build iOS → Run workflow。
on:
  workflow_dispatch:
  push:
    paths:
      - "cpp/**"
      - ".github/workflows/ios.yml"

jobs:
  build_ios:
    name: Build prism_demo for iOS (simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # Qt for iOS 依赖同版本 desktop Qt 提供主机工具(moc/rcc/qmlimportscanner)
      - name: Install Qt (macOS desktop host)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.3"
          host: mac
          target: desktop
          arch: clang_64
          modules: qtshadertools

      - name: Install Qt for iOS
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.3"
          host: mac
          target: ios
          modules: qtshadertools

      - name: Show toolchain
        run: |
          echo "QT_ROOT_DIR=$QT_ROOT_DIR"
          which qt-cmake || true
          xcodebuild -version
          cmake --version

      - name: Configure (qt-cmake for iOS simulator)
        run: |
          # iOS 模拟器构建(x86_64/arm64 sim), 不需 Apple 开发者账号签名即可验证可构建。
          # QT_HOST_PATH 指向 desktop Qt(install-qt-action 装到 ../Qt/.../macos)。
          QT_IOS="$(dirname "$QT_ROOT_DIR")/ios"
          QT_HOST="$(dirname "$QT_ROOT_DIR")/macos"
          echo "QT_IOS=$QT_IOS  QT_HOST=$QT_HOST"
          "$QT_IOS/bin/qt-cmake" -S cpp -B cpp/build-ios -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_HOST_PATH="$QT_HOST" \
            -DPRISM_BUILD_TESTS=OFF \
            -DPRISM_VERIFY_MOBILE=OFF \
            -DCMAKE_OSX_SYSROOT=iphonesimulator

      - name: Build (xcodebuild, simulator, no codesign)
        run: |
          cd cpp/build-ios
          xcodebuild -project prism_demo.xcodeproj -scheme prism_demo \
            -configuration Release -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            | tail -40
          echo "=== 产物 .app ==="
          find . -name "*.app" -type d | head

      - uses: actions/upload-artifact@v4
        with:
          name: prism_demo-ios-sim
          path: cpp/build-ios/**/*.app
          if-no-files-found: warn
